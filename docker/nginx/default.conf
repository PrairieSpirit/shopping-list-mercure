server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    gzip on;
    gzip_types text/plain application/json text/javascript text/css;

    # Static SPA
    location = / {
        try_files /index.html =404;
    }

    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    # Proxy Mercure hub — EventSource (SSE)
    # CRITICAL: these headers enable proper SSE streaming
    location /.well-known/mercure {
        proxy_pass http://mercure:80/.well-known/mercure;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        
        # SSE requires HTTP/1.1
        proxy_http_version 1.1;
        
        # No buffering — stream events immediately
        proxy_buffering off;
        proxy_cache off;
        
        # Keep connection alive
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        
        # Forward original client info
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API → PHP-FPM
    location /api/ {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }
}
