services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopping_php
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      mercure:
        condition: service_started
    networks:
      - shopping_network
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"

  nginx:
    image: nginx:alpine
    container_name: shopping_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mercure
    networks:
      - shopping_network

  mysql:
    image: mysql:8.0
    container_name: shopping_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony_user
      MYSQL_PASSWORD: symfony_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shopping_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  ###> symfony/mercure-bundle ###
  mercure:
    image: dunglas/mercure:latest
    container_name: shopping_mercure
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: 'shopping-list-jwt-secret-key-change-in-prod'
      MERCURE_SUBSCRIBER_JWT_KEY: 'shopping-list-jwt-secret-key-change-in-prod'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins "*"
        anonymous
    networks:
      - shopping_network
    # Accessed via nginx proxy at /.well-known/mercure — not exposed directly
  ###< symfony/mercure-bundle ###

volumes:
  mysql_data:
  ###> symfony/mercure-bundle ###
  mercure_data:
  ###< symfony/mercure-bundle ###

networks:
  shopping_network:
    driver: bridge
